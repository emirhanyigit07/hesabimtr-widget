<div style="width:100%;max-width:100%;overflow:hidden;background:transparent;">
  <iframe
    id="hesabimtr-teslimat-galerisi"
    src="https://emirhanyigit07.github.io/hesabimtr-widget/teslimat-galerisi.html"
    title="hesabımtr tamamlanan teslimatlar"
    loading="lazy"
    scrolling="no"
    allowtransparency="true"
    style="
      width:100%;
      height:2600px;
      display:block;
      border:0;
      margin:0;
      padding:0;
      overflow:hidden;
      background:transparent;
      background-color:transparent;
    ">
  </iframe>
</div>

<script>
  window.addEventListener("message", function (event) {
    if (
      event.data &&
      event.data.type === "hesabimtr-resize" &&
      event.data.height
    ) {
      const iframe = document.getElementById(
        "hesabimtr-teslimat-galerisi"
      );

      if (iframe) {
        iframe.style.height =
          Math.max(800, Number(event.data.height) + 20) + "px";
      }
    }
  });
</script>
