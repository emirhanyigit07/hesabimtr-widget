  <style>
    :root {
      --section-bg: #ffffff;
      --card-bg: #ffffff;
      --text: #050505;
      --muted: #171717;
      --radius: 9px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      background: var(--section-bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .stats-section {
      width: 100%;
      min-height: 300px;
      padding: 39px 22px 38px;
      background:
        radial-gradient(circle at 50% -40%, rgba(255, 255, 255, .98), transparent 46%),
        var(--section-bg);
    }

    .stats-title {
      margin: 0;
      text-align: center;
      font-size: clamp(21px, 1.8vw, 26px);
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -.35px;
      opacity: 0;
      transform: translateY(-10px);
      animation: title-in .6s cubic-bezier(.2, .8, .2, 1) .08s forwards;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 20px;
      margin-top: 35px;
    }

    .stat-card {
      position: relative;
      min-width: 0;
      min-height: 156px;
      padding: 22px 21px 18px;
      overflow: hidden;
      border: 1px solid rgba(7, 20, 40, .025);
      border-radius: var(--radius);
      background: var(--card-bg);
      box-shadow: 0 5px 18px rgba(37, 55, 83, .025);
      opacity: 0;
      translate: 0 18px;
      transition:
        transform .25s ease,
        box-shadow .25s ease,
        border-color .25s ease;
      animation: card-in .64s cubic-bezier(.2, .85, .25, 1) forwards;
    }

    .stat-card:nth-child(1) { animation-delay: .15s; }
    .stat-card:nth-child(2) { animation-delay: .24s; }
    .stat-card:nth-child(3) { animation-delay: .33s; }
    .stat-card:nth-child(4) { animation-delay: .42s; }
    .stat-card:nth-child(5) { animation-delay: .51s; }

    .stat-card::after {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(110deg, transparent 25%, rgba(255, 255, 255, .75) 42%, transparent 58%);
      content: "";
      pointer-events: none;
      transform: translateX(-125%);
      animation: shine 4.8s ease-in-out 1.4s infinite;
    }

    .stat-card:hover {
      z-index: 1;
      border-color: rgba(25, 116, 255, .11);
      box-shadow: 0 13px 28px rgba(38, 64, 101, .10);
      transform: translateY(-5px);
    }

    .stat-icon {
      display: grid;
      width: 43px;
      height: 43px;
      margin-bottom: 12px;
      place-items: center;
      transform-origin: 50% 70%;
      animation: icon-float 3.2s ease-in-out infinite;
    }

    .stat-card:nth-child(2n) .stat-icon { animation-delay: -.9s; }
    .stat-card:nth-child(3n) .stat-icon { animation-delay: -1.7s; }

    .stat-icon svg {
      display: block;
      width: 43px;
      height: 43px;
      overflow: visible;
    }

    .stat-number {
      display: block;
      min-height: 29px;
      font-size: 24px;
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: .1px;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.32;
      font-weight: 400;
      white-space: normal;
    }

    @keyframes title-in {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes card-in {
      to { opacity: 1; translate: 0 0; }
    }

    @keyframes icon-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-4px) rotate(1.5deg); }
    }

    @keyframes shine {
      0%, 68%, 100% { transform: translateX(-125%); }
      82% { transform: translateX(125%); }
    }

    @media (max-width: 1000px) {
      .stats-section {
        min-height: 0;
        padding: 30px 16px 24px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        grid-auto-columns: auto;
        grid-auto-flow: row;
        gap: 14px;
        width: 100%;
        max-width: 360px;
        margin: 25px auto 0;
        padding: 0;
        overflow: visible;
        scroll-snap-type: none;
      }

      .stat-card {
        width: 100%;
        text-align: center;
        scroll-snap-align: none;
      }

      .stat-icon {
        margin-right: auto;
        margin-left: auto;
      }
    }

    @media (max-width: 520px) {
      .stats-section {
        min-height: 0;
        padding: 30px 14px 24px;
      }

      .stats-title {
        max-width: 310px;
        margin-inline: auto;
      }

      .stats-grid {
        max-width: 320px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

  <script>
    (() => {
      const counters = document.querySelectorAll('.stat-number');
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const startDay = Date.UTC(2026, 6, 16);

      const getIstanbulDay = () => {
        const parts = new Intl.DateTimeFormat('en-US', {
          timeZone: 'Europe/Istanbul',
          year: 'numeric',
          month: 'numeric',
          day: 'numeric'
        }).formatToParts(new Date());
        const date = Object.fromEntries(parts.map(({ type, value }) => [type, value]));
        return Date.UTC(Number(date.year), Number(date.month) - 1, Number(date.day));
      };

      const elapsedDays = Math.max(0, Math.floor((getIstanbulDay() - startDay) / 86400000));

      const format = (value) => Math.round(value).toLocaleString('en-US');

      const getCurrentValue = (counter) => {
        const baseValue = Number(counter.dataset.value || 0);
        const dailyIncrease = Number(counter.dataset.daily || 0);
        return baseValue + (dailyIncrease * elapsedDays);
      };

      const setFinalValue = (counter) => {
        const value = getCurrentValue(counter);
        const suffix = counter.dataset.suffix || '';
        counter.textContent = format(value) + suffix;
      };

      const animateCounter = (counter) => {
        const target = getCurrentValue(counter);
        const suffix = counter.dataset.suffix || '';
        const duration = 1550;
        const start = performance.now();

        const tick = (now) => {
          const progress = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 4);
          counter.textContent = format(target * eased) + suffix;

          if (progress < 1) {
            requestAnimationFrame(tick);
          } else {
            setFinalValue(counter);
          }
        };

        requestAnimationFrame(tick);
      };

      if (reduceMotion || !('IntersectionObserver' in window)) {
        counters.forEach(setFinalValue);
        return;
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          counters.forEach((counter, index) => {
            window.setTimeout(() => animateCounter(counter), index * 85);
          });
          observer.disconnect();
        });
      }, { threshold: 0.35 });

      observer.observe(document.querySelector('.stats-section'));
    })();
  </script>
