<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#ffffff">
  <title>HESABIMTR Birleşik Ana Sayfa</title>
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: #fff;
      color: #101820;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body {
      zoom: .86;
    }
    htr-stats-widget,
    htr-main-widget,
    htr-faq-widget,
    htr-footer-widget {
      display: block;
      width: 100%;
      min-width: 0;
    }
    @media (max-width: 900px) {
      body {
        zoom: .84;
      }
    }
  </style>
</head>
<body>
  <htr-stats-widget></htr-stats-widget>

  <htr-main-widget>
    <htr-faq-widget slot="faq"></htr-faq-widget>
  </htr-main-widget>

  <htr-footer-widget></htr-footer-widget>

  <script>
    (() => {
      const MAIN_CSS = "\n:host {\n  display: block;\n  width: 100%;\n  min-width: 0;\n  contain: layout style;\n}\n.component-root {\n  width: 100%;\n  min-width: 0;\n}\n\n    :host {\n      --htr-cyan: #08afe8;\n      --htr-cyan-2: #45d7ff;\n      --htr-cyan-dark: #0484bb;\n      --htr-blue: #176bff;\n      --htr-navy: #0c1724;\n      --htr-ink: #101820;\n      --htr-muted: #61707e;\n      --htr-line: #dfeef5;\n      --htr-soft: #f4fbfe;\n      --htr-white: #ffffff;\n      --htr-success: #13b879;\n      --htr-warning: #ffb018;\n      --htr-radius-xl: 34px;\n      --htr-radius-lg: 24px;\n      --htr-radius-md: 18px;\n      --htr-shadow: 0 28px 80px rgba(5, 103, 145, .12);\n      --htr-shadow-soft: 0 14px 45px rgba(5, 103, 145, .08);\n      --htr-ease: cubic-bezier(.2, .8, .2, 1);\n    }\n\n    * {\n      box-sizing: border-box;\n    }\n\n    :host {\n      scroll-behavior: smooth;\n    }\n\n    .component-root {\n      margin: 0;\n      overflow-x: hidden;\n      background: #fff;\n      color: var(--htr-ink);\n      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Arial, sans-serif;\n      -webkit-font-smoothing: antialiased;\n      text-rendering: optimizeLegibility;\n    }\n\n    a {\n      color: inherit;\n      text-decoration: none;\n    }\n\n    button,\n    a {\n      -webkit-tap-highlight-color: transparent;\n    }\n\n    button,\n    input {\n      font: inherit;\n    }\n\n    img,\n    svg {\n      display: block;\n    }\n\n    .htr-sprite {\n      position: absolute;\n      width: 0;\n      height: 0;\n      overflow: hidden;\n    }\n\n    .htr-home {\n      position: relative;\n      isolation: isolate;\n      overflow: hidden;\n      background:\n        radial-gradient(circle at 2% 5%, rgba(8, 175, 232, .10), transparent 20%),\n        radial-gradient(circle at 99% 22%, rgba(23, 107, 255, .06), transparent 18%),\n        #fff;\n    }\n\n    .htr-container {\n      width: min(1240px, calc(100% - 40px));\n      margin-inline: auto;\n    }\n\n    .htr-section {\n      position: relative;\n      padding: 80px 0;\n    }\n\n    .htr-section--soft {\n      border-block: 1px solid var(--htr-line);\n      background:\n        linear-gradient(rgba(8, 175, 232, .025) 1px, transparent 1px),\n        linear-gradient(90deg, rgba(8, 175, 232, .025) 1px, transparent 1px),\n        var(--htr-soft);\n      background-size: 34px 34px;\n    }\n\n    .htr-kicker {\n      display: inline-flex;\n      align-items: center;\n      gap: 8px;\n      margin: 0 0 14px;\n      color: var(--htr-cyan-dark);\n      font-size: 12px;\n      font-weight: 900;\n      letter-spacing: .13em;\n      text-transform: uppercase;\n    }\n\n    .htr-kicker::before {\n      width: 25px;\n      height: 2px;\n      border-radius: 10px;\n      content: \"\";\n      background: linear-gradient(90deg, var(--htr-cyan), var(--htr-blue));\n    }\n\n    .htr-section-head {\n      display: flex;\n      align-items: end;\n      justify-content: space-between;\n      gap: 30px;\n      margin-bottom: 34px;\n    }\n\n    .htr-section-head__copy {\n      max-width: 720px;\n    }\n\n    .htr-section-head h2,\n    .htr-trust-copy h2,\n    .htr-sell-copy h2,\n    .htr-final-copy h2 {\n      margin: 0;\n      font-size: clamp(31px, 4vw, 52px);\n      line-height: 1.05;\n      letter-spacing: -.045em;\n    }\n\n    .htr-section-head p,\n    .htr-trust-copy > p,\n    .htr-sell-copy > p,\n    .htr-final-copy > p {\n      margin: 15px 0 0;\n      color: var(--htr-muted);\n      font-size: 16px;\n      line-height: 1.75;\n    }\n\n    .htr-link-arrow {\n      display: inline-flex;\n      min-width: max-content;\n      align-items: center;\n      gap: 9px;\n      padding: 12px 0;\n      color: var(--htr-ink);\n      font-size: 14px;\n      font-weight: 850;\n      transition: gap .25s ease, color .25s ease;\n    }\n\n    .htr-link-arrow:hover {\n      gap: 14px;\n      color: var(--htr-cyan-dark);\n    }\n\n    .htr-link-arrow svg {\n      width: 18px;\n      height: 18px;\n      fill: none;\n      stroke: currentColor;\n      stroke-linecap: round;\n      stroke-linejoin: round;\n      stroke-width: 2;\n    }\n\n    .htr-btn {\n      position: relative;\n      display: inline-flex;\n      min-height: 52px;\n      align-items: center;\n      justify-content: center;\n      gap: 10px;\n      overflow: hidden;\n      padding: 0 23px;\n      border: 1px solid transparent;\n      border-radius: 16px;\n      font-size: 14px;\n      font-weight: 850;\n      letter-spacing: -.01em;\n      transition: transform .28s var(--htr-ease), box-shadow .28s ease, border-color .28s ease, background-color .28s ease;\n    }\n\n    .htr-btn::after {\n      position: absolute;\n      top: -50%;\n      left: -65%;\n      width: 35%;\n      height: 200%;\n      content: \"\";\n      transform: rotate(25deg);\n      background: rgba(255, 255, 255, .36);\n      transition: left .55s ease;\n    }\n\n    .htr-btn:hover::after {\n      left: 125%;\n    }\n\n    .htr-btn:hover {\n      transform: translateY(-3px);\n    }\n\n    .htr-btn svg {\n      width: 20px;\n      height: 20px;\n      flex: 0 0 auto;\n      fill: none;\n      stroke: currentColor;\n      stroke-linecap: round;\n      stroke-linejoin: round;\n      stroke-width: 2;\n    }\n\n    .htr-btn--primary {\n      background: linear-gradient(135deg, var(--htr-cyan) 0%, var(--htr-blue) 100%);\n      box-shadow: 0 16px 32px rgba(8, 151, 220, .25);\n      color: #fff;\n    }\n\n    .htr-btn--primary:hover {\n      box-shadow: 0 22px 42px rgba(8, 151, 220, .34);\n    }\n\n    .htr-btn--ghost {\n      border-color: var(--htr-line);\n      background: rgba(255, 255, 255, .82);\n      box-shadow: 0 10px 25px rgba(10, 73, 102, .06);\n      color: var(--htr-ink);\n    }\n\n    .htr-btn--ghost:hover {\n      border-color: rgba(8, 175, 232, .45);\n      background: #fff;\n    }\n\n    .htr-btn--dark {\n      background: var(--htr-navy);\n      box-shadow: 0 16px 32px rgba(3, 18, 30, .2);\n      color: #fff;\n    }\n\n    .htr-btn--whatsapp {\n      background: #17bd70;\n      box-shadow: 0 16px 32px rgba(23, 189, 112, .22);\n      color: #fff;\n    }\n\n    /* Hero */\n    .htr-hero {\n      position: relative;\n      min-height: 720px;\n      overflow: hidden;\n      padding: 82px 0 74px;\n      border-bottom: 1px solid var(--htr-line);\n      background:\n        radial-gradient(circle at 82% 42%, rgba(69, 215, 255, .21), transparent 22%),\n        radial-gradient(circle at 68% 12%, rgba(23, 107, 255, .08), transparent 20%),\n        linear-gradient(180deg, #fff 0%, #f7fcff 100%);\n    }\n\n    .htr-hero::before {\n      position: absolute;\n      inset: 0;\n      z-index: 0;\n      content: \"\";\n      opacity: .62;\n      background-image: radial-gradient(rgba(8, 175, 232, .22) 1px, transparent 1px);\n      background-size: 24px 24px;\n      mask-image: linear-gradient(90deg, transparent, #000 48%, #000 100%);\n    }\n\n    .htr-hero::after {\n      position: absolute;\n      z-index: 0;\n      top: -55%;\n      right: -20%;\n      width: 920px;\n      height: 920px;\n      border: 1px solid rgba(8, 175, 232, .12);\n      border-radius: 50%;\n      content: \"\";\n      box-shadow: inset 0 0 0 90px rgba(8, 175, 232, .018), inset 0 0 0 180px rgba(8, 175, 232, .018);\n    }\n\n    .htr-hero-grid {\n      position: relative;\n      z-index: 2;\n      display: grid;\n      grid-template-columns: minmax(0, 1.02fr) minmax(440px, .98fr);\n      gap: 66px;\n      align-items: center;\n    }\n\n    .htr-hero-copy {\n      max-width: 680px;\n    }\n\n    .htr-hero-badge {\n      display: inline-flex;\n      align-items: center;\n      gap: 10px;\n      margin-bottom: 22px;\n      padding: 9px 13px 9px 10px;\n      border: 1px solid rgba(8, 175, 232, .22);\n      border-radius: 999px;\n      background: rgba(255, 255, 255, .78);\n      box-shadow: 0 9px 25px rgba(5, 105, 148, .07);\n      color: #23566d;\n      font-size: 12px;\n      font-weight: 850;\n      backdrop-filter: blur(10px);\n    }\n\n    .htr-live-dot {\n      position: relative;\n      width: 8px;\n      height: 8px;\n      border-radius: 50%;\n      background: var(--htr-success);\n      box-shadow: 0 0 0 5px rgba(19, 184, 121, .13);\n    }\n\n    .htr-live-dot::after {\n      position: absolute;\n      inset: -5px;\n      border: 1px solid rgba(19, 184, 121, .5);\n      border-radius: inherit;\n      content: \"\";\n      animation: htrPulse 2s ease-out infinite;\n    }\n\n    .htr-hero h1 {\n      max-width: 700px;\n      margin: 0;\n      font-size: clamp(47px, 6vw, 79px);\n      line-height: .99;\n      letter-spacing: -.065em;\n    }\n\n    .htr-hero h1 span {\n      color: transparent;\n      background: linear-gradient(100deg, var(--htr-cyan-dark), var(--htr-blue) 70%);\n      -webkit-background-clip: text;\n      background-clip: text;\n    }\n\n    .htr-hero-lead {\n      max-width: 620px;\n      margin: 24px 0 0;\n      color: var(--htr-muted);\n      font-size: 17px;\n      line-height: 1.78;\n    }\n\n    .htr-hero-actions {\n      display: flex;\n      flex-wrap: wrap;\n      gap: 12px;\n      margin-top: 30px;\n    }\n\n    .htr-hero-trust {\n      display: flex;\n      flex-wrap: wrap;\n      gap: 17px 24px;\n      margin-top: 28px;\n      padding: 0;\n      list-style: none;\n    }\n\n    .htr-hero-trust li {\n      display: flex;\n      align-items: center;\n      gap: 8px;\n      color: #465763;\n      font-size: 12.5px;\n      font-weight: 750;\n    }\n\n    .htr-hero-trust svg {\n      width: 18px;\n      height: 18px;\n      color: var(--htr-cyan-dark);\n      fill: none;\n      stroke: currentColor;\n      stroke-linecap: round;\n      stroke-linejoin: round;\n      stroke-width: 2;\n    }\n\n    .htr-hero-stage {\n      position: relative;\n      min-height: 515px;\n      transform-style: preserve-3d;\n    }\n\n    .htr-stage-orbit {\n      position: absolute;\n      top: 50%;\n      left: 50%;\n      width: 430px;\n      height: 430px;\n      border: 1px dashed rgba(8, 175, 232, .35);\n      border-radius: 50%;\n      transform: translate(-50%, -50%);\n      animation: htrSpin 32s linear infinite;\n    }\n\n    .htr-stage-orbit::before,\n    .htr-stage-orbit::after {\n      position: absolute;\n      width: 13px;\n      height: 13px;\n      border: 4px solid #fff;\n      border-radius: 50%;\n      content: \"\";\n      background: var(--htr-cyan);\n      box-shadow: 0 5px 18px rgba(8, 175, 232, .35);\n    }\n\n    .htr-stage-orbit::before {\n      top: 39px;\n      left: 68px;\n    }\n\n    .htr-stage-orbit::after {\n      right: 26px;\n      bottom: 96px;\n      background: var(--htr-blue);\n    }\n\n    .htr-main-card {\n      position: absolute;\n      z-index: 3;\n      top: 76px;\n      left: 50%;\n      width: 310px;\n      height: 355px;\n      overflow: hidden;\n      border: 1px solid rgba(255, 255, 255, .8);\n      border-radius: 34px;\n      transform: translateX(-50%) rotate(-2.5deg);\n      background:\n        radial-gradient(circle at 20% 10%, rgba(69, 215, 255, .42), transparent 32%),\n        linear-gradient(155deg, #0d2438 0%, #0b1724 55%, #092438 100%);\n      box-shadow: 0 42px 90px rgba(6, 49, 76, .28), inset 0 1px 0 rgba(255, 255, 255, .15);\n      color: #fff;\n      animation: htrFloat 6s ease-in-out infinite;\n    }\n\n    .htr-main-card::after {\n      position: absolute;\n      top: -90px;\n      right: -90px;\n      width: 230px;\n      height: 230px;\n      border: 40px solid rgba(69, 215, 255, .06);\n      border-radius: 50%;\n      content: \"\";\n    }\n\n    .htr-main-card__top {\n      position: relative;\n      z-index: 2;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      padding: 24px 24px 0;\n    }\n\n    .htr-brand-chip {\n      display: flex;\n      align-items: center;\n      gap: 10px;\n      font-size: 15px;\n      font-weight: 900;\n      letter-spacing: -.025em;\n    }\n\n    .htr-brand-chip img {\n      width: 37px;\n      height: 37px;\n      border: 1px solid rgba(255, 255, 255, .16);\n      border-radius: 12px;\n      object-fit: cover;\n      box-shadow: 0 8px 20px rgba(0, 0, 0, .18);\n    }\n\n    .htr-card-status {\n      display: flex;\n      align-items: center;\n      gap: 6px;\n      color: #a9eaff;\n      font-size: 10px;\n      font-weight: 850;\n      letter-spacing: .08em;\n      text-transform: uppercase;\n    }\n\n    .htr-main-card__art {\n      position: relative;\n      display: grid;\n      width: 176px;\n      height: 176px;\n      margin: 26px auto 20px;\n      place-items: center;\n      border: 1px solid rgba(69, 215, 255, .18);\n      border-radius: 50%;\n      background: radial-gradient(circle, rgba(69, 215, 255, .20), rgba(69, 215, 255, .03) 62%, transparent 63%);\n      box-shadow: 0 0 70px rgba(8, 175, 232, .17);\n    }\n\n    .htr-main-card__art::before,\n    .htr-main-card__art::after {\n      position: absolute;\n      inset: 18px;\n      border: 1px dashed rgba(255, 255, 255, .13);\n      border-radius: 50%;\n      content: \"\";\n      animation: htrSpinLocal 18s linear infinite reverse;\n    }\n\n    .htr-main-card__art::after {\n      inset: 42px;\n      border-style: solid;\n      animation: none;\n    }\n\n    .htr-main-card__art svg {\n      position: relative;\n      z-index: 2;\n      width: 82px;\n      height: 82px;\n      fill: none;\n      stroke: #e9fbff;\n      stroke-linecap: round;\n      stroke-linejoin: round;\n      stroke-width: 1.5;\n      filter: drop-shadow(0 10px 18px rgba(8, 175, 232, .25));\n    }\n\n    .htr-main-card__bottom {\n      position: relative;\n      z-index: 2;\n      padding: 0 25px;\n    }\n\n    .htr-main-card__bottom small {\n      display: block;\n      margin-bottom: 7px;\n      color: #7fdfff;\n      font-size: 10px;\n      font-weight: 850;\n      letter-spacing: .12em;\n      text-transform: uppercase;\n    }\n\n    .htr-main-card__bottom strong {\n      display: block;\n      font-size: 24px;\n      line-height: 1.12;\n      letter-spacing: -.045em;\n    }\n\n    .htr-float-card {\n      position: absolute;\n      z-index: 5;\n      display: flex;\n      width: 206px;\n      align-items: center;\n      gap: 12px;\n      padding: 12px;\n      border: 1px solid rgba(8, 175, 232, .18);\n      border-radius: 18px;\n      background: rgba(255, 255, 255, .92);\n      box-shadow: 0 18px 48px rgba(8, 92, 130, .17);\n      backdrop-filter: blur(14px);\n      transition: transform .35s var(--htr-ease), box-shadow .35s ease;\n    }\n\n    .htr-float-card:hover {\n      z-index: 9;\n      transform: translateY(-7px) rotate(0deg) !important;\n      box-shadow: 0 26px 58px rgba(8, 92, 130, .22);\n    }\n\n    .htr-float-card--one {\n      top: 38px;\n      right: -8px;\n      transform: rotate(4deg);\n      animation: htrFloatMini 5.4s ease-in-out infinite .4s;\n    }\n\n    .htr-float-card--two {\n      bottom: 37px;\n      left: -10px;\n      transform: rotate(-4deg);\n      animation: htrFloatMini 6.1s ease-in-out infinite .9s;\n    }\n\n    .htr-float-thumb {\n      width: 58px;\n      height: 58px;\n      flex: 0 0 58px;\n      overflow: hidden;\n      border-radius: 13px;\n      background: #dff6ff;\n    }\n\n    .htr-float-thumb img {\n      width: 100%;\n      height: 100%;\n      object-fit: cover;\n    }\n\n    .htr-float-copy {\n      min-width: 0;\n    }\n\n    .htr-float-copy small {\n      display: block;\n      margin-bottom: 5px;\n      color: var(--htr-cyan-dark);\n      font-size: 9px;\n      font-weight: 900;\n      letter-spacing: .09em;\n      text-transform: uppercase;\n    }\n\n    .htr-float-copy strong {\n      display: -webkit-box;\n      overflow: hidden;\n      font-size: 12.5px;\n      line-height: 1.35;\n      -webkit-box-orient: vertical;\n      -webkit-line-clamp: 2;\n    }\n\n    .htr-secure-chip {\n      position: absolute;\n      z-index: 6;\n      right: 14px;\n      bottom: 92px;\n      display: flex;\n }\n\n    .htr-quick svg {\n      width: 21px;\n      height: 21px;\n      flex: 0 0 auto;\n      color: var(--htr-cyan);\n      fill: none;\n      stroke: currentColor;\n      stroke-linecap: round;\n      stroke-linejoin: round;\n      stroke-width: 1.9;\n    }\n\n    /* Games */\n    .htr-games {\n      display: grid;\n      grid-template-columns: 1.18fr .91fr .91fr;\n      gap: 18px;\n    }\n\n    .htr-game-card {\n      position: relative;\n      min-height: 350px;\n      overflow: hidden;\n      border: 1px solid rgba(255, 255, 255, .35);\n      border-radius: 29px;\n      box-shadow: 0 20px 55px rgba(8, 41, 65, .15);\n      color: #fff;\n      transition: transform .42s var(--htr-ease), box-shadow .42s ease;\n    }\n\n    .htr-game-card:hover {\n      transform: translateY(-9px);\n      box-shadow: 0 32px 70px rgba(8, 41, 65, .23);\n    }\n\n    .htr-game-card--zula {\n      background:\n        radial-gradient(circle at 80% 20%, rgba(69, 215, 255, .36), transparent 28%),\n        linear-gradient(145deg, #073d5b 0%, #0b1724 68%);\n    }\n\n    .htr-game-card--valorant {\n      background:\n        radial-gradient(circle at 95% 0%, rgba(255, 155, 165, .36), transparent 35%),\n        linear-gradient(145deg, #ff5264 0%, #9f243e 100%);\n    }\n\n    .htr-game-card--pubg {\n      background:\n        radial-gradient(circle at 90% 10%, rgba(255, 221, 101, .28), transparent 34%),\n        linear-gradient(145deg, #d8840c 0%, #7a3e06 100%);\n    }\n\n    .htr-game-card::before {\n      position: absolute;\n      top: -120px;\n      right: -110px;\n      width: 330px;\n      height: 330px;\n      border: 50px solid rgba(255, 255, 255, .06);\n      border-radius: 50%;\n      content: \"\";\n      transition: transform .6s var(--htr-ease);\n    }\n\n    .htr-game-card:hover::before {\n      transform: scale(1.18) rotate(20deg);\n    }\n\n    .htr-game-card__ghost {\n      position: absolute;\n      right: -7px;\n      bottom: -20px;\n      color: rgba(255, 255, 255, .10)       const FAQ_HTML = "<div class=\"component-root\">\n<main class=\"faq-shell\">\n<span aria-hidden=\"true\" class=\"pixel pixel-one\"></span>\n<span aria-hidden=\"true\" class=\"pixel pixel-two\"></span>\n<span aria-hidden=\"true\" class=\"pixel pixel-three\"></span>\n<div class=\"faq-wrap\">\n<header class=\"faq-heading\">\n<div class=\"eyebrow\"><span class=\"eyebrow-dot\"></span> HESABIMTR • OYUN MAĞAZASI</div>\n<h1>Sıkça Sorulan Sorular</h1>\n<p class=\"lead\">Sipariş, teslimat ve oyun ürünleriyle ilgili en çok merak edilen soruların cevapları burada.</p>\n</header>\n<section aria-label=\"Sıkça sorulan sorular\" class=\"faq-list\">\n<article class=\"faq-item is-open\">\n<button aria-expanded=\"true\" class=\"faq-question\" type=\"button\">\n<span aria-hidden=\"true\" class=\"question-icon\">\n<svg fill=\"none\" viewbox=\"0 0 24 24\"><path d=\"M5 9h14l1.4 8.1a2 2 0 0 1-3.4 1.7l-2.2-2.3H9.2L7 18.8a2 2 0 0 1-3.4-1.7L5 9Z\" stroke=\"currentColor\" stroke-width=\"1.8\"></path><path d=\"M8.2 11.8v3.4M6.5 13.5h3.4M16.7 12.5h.01M18.2 14h.01\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-width=\"1.8\"></path></svg>\n</span>\n<span class=\"question-text\">Siparişimi verdikten sonra ürünüm nasıl teslim edilir?</span>\n<span aria-hidden=\"true\" class=\"toggle\"></span>\n</button>\n<div class=\"faq-answer\"><div class=\"answer-inner\"><p class=\"answer-copy\">Dijital ürününüz, sipariş sırasında kullandığınız iletişim bilgileri üzerinden teslim edilir. Hesap ürünlerinde bilgiler güvenli şekilde paylaşılır; oyun parası ve kod ürünlerinde ise ürün türüne uygun teslimat yöntemi kullanılır.</p></div></div>\n</article>\n<article class=\"faq-item\">\n<button aria-expanded=\"false\" class=\"faq-question\" type=\"button\">\n<span aria-hidden=\"true\" class=\"question-icon\">\n<svg fill=\"none\" viewbox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"8.5\" stroke=\"currentColor\" stroke-width=\"1.8\"></circle><path d=\"M12 7.5v5l3.4 2\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-width=\"1.8\"></path></svg>\n</span>\n<span class=\"question-text\">Ortalama teslimat süresi ne kadar?</span>\n<span aria-hidden=\"true\" class=\"toggle\"></span>\n</button>\n<div class=\"faq-answer\"><div class=\"answer-inner\"><p class=\"answer-copy\">Teslimatlar çoğunlukla birkaç dakika içinde başlatılır. Yoğunluk, ödeme kontrolü veya oyun sistemindeki bakım çalışmaları teslimat süresini kısa süreli etkileyebilir.</p></div></div>\n</article>\n<article class=\"faq-item\">\n<button aria-expanded=\"false\" class=\"faq-question\" type=\"button\">\n<span aria-hidden=\"true\" class=\"question-icon\">\n<svg fill=\"none\" viewbox=\"0 0 24 24\"><path d=\"M6.5 10V8a5.5 5.5 0 0 1 11 0v2\" stroke=\"currentColor\" stroke-width=\"1.8\"></path><rect height=\"10\" rx=\"2.5\" stroke=\"currentColor\" stroke-width=\"1.8\" width=\"15\" x=\"4.5\" y=\"10\"></rect><path d=\"M12 14v2.5\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-width=\"1.8\"></path></svg>\n</span>\n<span class=\"question-text\">Satın aldığım oyun hesabı güvenli mi?</span>\n<span aria-hidden=\"true\" class=\"toggle\"></span>\n</button>\n<div class=\"faq-answer\"><div class=\"answer-inner\"><p class=\"answer-copy\">Hesap bilgileri teslimat öncesinde kontrol edilir ve ürün açıklamasındaki özelliklerle eşleştirilir. Teslim aldıktan sonra giriş bilgilerinizi değiştirmeniz ve hesabınıza ek güvenlik seçeneklerini tanımlamanız önerilir.</p></div></div>\n</article>\n<article class=\"faq-item\">\n<button aria-expanded=\"false\" class=\"faq-question\" type=\"button\">\n<span aria-hidden=\"true\" class=\"question-icon\">\n<svg fill=\"none\" viewbox=\"0 0 24 24\"><rect height=\"13\" rx=\"2.5\" stroke=\"currentColor\" stroke-width=\"1.8\" width=\"18\" x=\"3\" y=\"5.5\"></rect><path d=\"M3 10h18M7 15h3\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-width=\"1.8\"></path></svg>\n</span>\n<span class=\"question-text\">Hangi ödeme yöntemlerini kullanabilirim?</span>\n<span aria-hidden=\"true\" class=\"toggle\"></span>\n</button>\n<div class=\"faq-answer\"><div class=\"answer-inner\"><p class=\"answer-copy\">Ödeme ekranında mağazanız için aktif olan güvenli ödeme seçeneklerini görebilirsiniz. Kullanılabilir yöntemler sipariş tutarına ve seçilen ürüne göre değişiklik gösterebilir.</p></div></div>\n</article>\n<article class=\"faq-item\">\n<button aria-expanded=\"false\" class=\"faq-question\" type=\"button\">\n<span aria-hidden=\"true\" class=\"question-icon\">\n<svg fill=\"none\" viewbox=\"0 0 24 24\"><path d=\"m4.5 12 5 5L19.5 7\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\"></path><circle cx=\"12\" cy=\"12\" opacity=\".45\" r=\"9\" stroke=\"currentColor\" stroke-width=\"1.5\"></circle></svg>\n</span>\n<span class=\"question-text\">Ürün bilgileri ilandakiyle aynı mı?</span>\n<span aria-hidden=\"true\" class=\"toggle\"></span>\n</button>\n<div class=\"faq-answer\"><div class=\"answer-inner\"><p class=\"answer-copy\">Ürün başlığı, açıklaması ve görsellerinde belirtilen özellikler esas alınır. Satın almadan önce seviye, içerik, oyun platformu ve teslimat detaylarını dikkatlice kontrol etmenizi öneririz.</p></div></div>\n</article>\n<article class=\"faq-item\">\n<button aria-expanded=\"false\" class=\"faq-question\" type=\"button\">\n<span aria-hidden=\"true\" class=\"question-icon\">\n<svg fill=\"none\" viewbox=\"0 0 24 24\"><path d=\"M4 7.5h16v10H4z\" stroke=\"currentColor\" stroke-width=\"1.8\"></path><path d=\"m5 9 7 5 7-5\" stroke=\"currentColor\" stroke-linejoin=\"round\" stroke-width=\"1.8\"></path></svg>\n</span>\n<span class=\"question-text\">Teslimat bilgileri hangi adrese gönderilir?</span>\n<span aria-hidden=\"true\" class=\"toggle\"></span>\n</button>\n<div class=\"faq-answer\"><div class=\"answer-inner\"><p class=\"answer-copy\">Teslimat, sipariş verirken yazdığınız e-posta adresi veya mağazada belirtilen iletişim kanalı üzerinden yapılır. Yanlış bilgi girdiyseniz teslimat başlamadan destek ekibine ulaşmalısınız.</p></div></div>\n</article>\n<article class=\"faq-item\">\n<button aria-expanded=\"false\" class=\"faq-question\" type=\"button\">\n<span aria-hidden=\"true\" class=\"question-icon\">\n<svg fill=\"none\" viewbox=\"0 0 24 24\"><path d=\"M7 6h10M7 10h7M6 19l-2 1 1-3a8 8 0 1 1 3 2\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"1.8\"></path></svg>\n</span>\n<span class=\"question-text\">Teslimatla ilgili sorun yaşarsam ne yapmalıyım?</span>\n<span aria-hidden=\"true\" class=\"toggle\"></span>\n</button>\n<div class=\"faq-answer\"><div class=\"answer-inner\"><p class=\"answer-copy\">Sipariş numaranızla birlikte destek ekibine ulaşın. Giriş hatası veya eksik teslimat gibi durumlarda bilgilerinizi paylaşmadan önce ekran görüntüsü almanız, kontrol sürecini hızlandırır.</p></div></div>\n</article>\n<article class=\"faq-item\">\n<button aria-expanded=\"false\" class=\"faq-question\" type=\"button\">\n<span aria-hidden=\"true\" class=\"question-icon\">\n<svg fill=\"none\" viewbox=\"0 0 24 24\"><path d=\"M4 17.5h16M6 14V8.5A2.5 2.5 0 0 1 8.5 6h7A2.5 2.5 0 0 1 18 8.5V14\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-width=\"1.8\"></path><path d=\"M9 10h6\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-width=\"1.8\"></path></svg>\n</span>\n<span class=\"question-text\">Kendi oyun hesabımı HESABIMTR’ye satabilir miyim?</span>\n<span aria-hidden=\"true\" class=\"toggle\"></span>\n</button>\n<div class=\"faq-answer\"><div class=\"answer-inner\"><p class=\"answer-copy\">Hesap satışı kabul edilen oyun ve hesap türlerine göre değerlendirilir. Sitedeki “Hesap Sat” bölümünden hesabınızın özelliklerini ileterek inceleme ve fiyat teklifi talep edebilirsiniz.</p></div></div>\n</article>\n</section>\n<p class=\"support-note\">\n<span class=\"support-message\">\n<span aria-hidden=\"true\" class=\"status-light\"></span>\n<span>Cevabınızı bulamadınız mı?</span>\n</span>\n<a aria-label=\"WhatsApp üzerinden HESAB       let resizeTimer = 0;
      const reportPageHeight = () => {
        clearTimeout(resizeTimer);
        resizeTimer = window.setTimeout(() => {
          const height = Math.ceil(Math.max(
            document.body.scrollHeight,
            document.documentElement.scrollHeight
          ));
          window.parent.postMessage({ type: 'hesabimtr:resize', height }, '*');
          window.parent.postMessage({ type: 'hesabimtr-combined-height', height }, '*');
        }, 20);
      };

      const mount = (host, css, markup) => {
        const root = host.attachShadow({ mode: 'open' });
        root.innerHTML = `<style>${css}</style>${markup}`;
        if ('ResizeObserver' in window) {
          const observer = new ResizeObserver(reportPageHeight);
          observer.observe(host);
          const componentRoot = root.querySelector('.component-root');
          if (componentRoot) observer.observe(componentRoot);
        }
        return root;
      };

      class HtrStatsWidget extends HTMLElement {
        connectedCallback() {
          if (this.shadowRoot) return;
          const root = mount(this, STATS_CSS, STATS_HTML);
          const counters = root.querySelectorAll('.stat-number');
          const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          const startDay = Date.UTC(2026, 6, 16);

          const getIstanbulDay = () => {
            const parts = new Intl.DateTimeFormat('en-US', {
              timeZone: 'Europe/Istanbul',
              year: 'numeric',
              month: 'numeric',
              day: 'numeric'
            }).formatToParts(new Date());
            const date = Object.fromEntries(parts.map(({ type, value }) => [type, value]));
            return Date.UTC(Number(date.year), Number(date.month) - 1, Number(date.day));
          };

          const elapsedDays = Math.max(0, Math.floor((getIstanbulDay() - startDay) / 86400000));
          const format = (value) => Math.round(value).toLocaleString('en-US');
          const getCurrentValue = (counter) =>
            Number(counter.dataset.value || 0) +
            (Number(counter.dataset.daily || 0) * elapsedDays);

          const setFinalValue = (counter) => {
            counter.textContent = format(getCurrentValue(counter)) + (counter.dataset.suffix || '');
          };

          const animateCounter = (counter) => {
            const target = getCurrentValue(counter);
            const suffix = counter.dataset.suffix || '';
            const duration = 1550;
            const start = performance.now();
            const tick = (now) => {
              const progress = Math.min((now - start) / duration, 1);
              const eased = 1 - Math.pow(1 - progress, 4);
              counter.textContent = format(target * eased) + suffix;
              if (progress < 1) requestAnimationFrame(tick);
              else setFinalValue(counter);
            };
            requestAnimationFrame(tick);
          };

          if (reduceMotion || !('IntersectionObserver' in window)) {
            counters.forEach(setFinalValue);
          } else {
            const observer = new IntersectionObserver((entries) => {
              entries.forEach((entry) => {
                if (!entry.isIntersecting) return;
                counters.forEach((counter, index) => {
                  window.setTimeout(() => animateCounter(counter), index * 85);
                });
                observer.disconnect();
              });
            }, { threshold: 0.25 });
            const section = root.querySelector('.stats-section');
            if (section) observer.observe(section);
          }
          reportPageHeight();
        }
      }

      class HtrFaqWidget extends HTMLElement {
        connectedCallback() {
          if (this.shadowRoot) return;
          const root = mount(this, FAQ_CSS, FAQ_HTML);
          const items = [...root.querySelectorAll('.faq-item')];

          items.forEach((item) => {
            const button = item.querySelector('.faq-question');
            if (!button) return;
            button.addEventListener('click', () => {
              const willOpen = !item.classList.contains('is-open');
              items.forEach((otherItem) => {
                otherItem.classList.remove('is-open');
                const otherButton = otherItem.querySelector('.faq-question');
                if (otherButton) otherButton.setAttribute('aria-expanded', 'false');
              });
              if (willOpen) {
                item.classList.add('is-open');
                button.setAttribute('aria-expanded', 'true');
              }
              reportPageHeight();
              setTimeout(reportPageHeight, 450);
            });
          });
          reportPageHeight();
        }
      }

      class HtrMainWidget extends HTMLElement {
        connectedCallback() {
          if (this.shadowRoot) return;
          const root = mount(this, MAIN_CSS, MAIN_HTML);
          const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          const revealItems = root.querySelectorAll('.htr-reveal:not(.is-visible)');

          if (!reducedMotion && 'IntersectionObserver' in window) {
            const revealObserver = new IntersectionObserver((entries, observer) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) {
                  entry.target.classList.add('is-visible');
                  observer.unobserve(entry.target);
                }
              });
            }, { threshold: 0.12, rootMargin: '0px 0px -35px' });
            revealItems.forEach((item) => revealObserver.observe(item));
            window.setTimeout(() => {
              revealItems.forEach((item) => item.classList.add('is-visible'));
              reportPageHeight();
            }, 1400);
          } else {
            revealItems.forEach((item) => item.classList.add('is-visible'));
          }

          if (!reducedMotion) {
            const stage = root.getElementById('htr-stage');
            if (stage && window.innerWidth > 900 && window.matchMedia('(pointer: fine)').matches) {
              stage.addEventListener('pointermove', (event) => {
                const rect = stage.getBoundingClientRect();
                const x = (event.clientX - rect.left) / rect.width - .5;
                const y = (event.clientY - rect.top) / rect.height - .5;
                stage.style.transform =
                  'perspective(900px) rotateY(' + (x * 4) +
                  'deg) rotateX(' + (y * -4) + 'deg)';
              });
              stage.addEventListener('pointerleave', () => { stage.style.transform = ''; });
            }
          }
          reportPageHeight();
        }
      }

      class HtrFooterWidget extends HTMLElement {
        connectedCallback() {
          if (this.shadowRoot) return;
          const root = mount(this, FOOTER_CSS, FOOTER_HTML);
          const year = root.getElementById('current-year');
          if (year) year.textContent = String(new Date().getFullYear());
          reportPageHeight();
        }
      }

      customElements.define('htr-stats-widget', HtrStatsWidget);
      customElements.define('htr-faq-widget', HtrFaqWidget);
      customElements.define('htr-main-widget', HtrMainWidget);
      customElements.define('htr-footer-widget', HtrFooterWidget);

      window.addEventListener('load', reportPageHeight);
      window.addEventListener('resize', reportPageHeight);
      if ('ResizeObserver' in window) {
        new ResizeObserver(reportPageHeight).observe(document.body);
      }
      setTimeout(reportPageHeight, 300);
      setTimeout(reportPageHeight, 1000);
      setTimeout(reportPageHeight, 2200);
    })();
  </script>
